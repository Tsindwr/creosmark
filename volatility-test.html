<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Volatility System Test</title>
  <style>
    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
      color: #e0e0e0;
      min-height: 100vh;
      margin: 0;
      padding: 20px;
    }
    
    .container {
      max-width: 1200px;
      margin: 0 auto;
    }
    
    h1 {
      text-align: center;
      color: #ffd700;
      font-family: 'Georgia', serif;
      text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.5);
    }
    
    .test-section {
      background: rgba(30, 30, 50, 0.8);
      border: 2px solid #4a4a6a;
      border-radius: 12px;
      padding: 20px;
      margin: 20px 0;
      box-shadow: 0 4px 15px rgba(0, 0, 0, 0.3);
    }
    
    .test-section h2 {
      color: #ffd700;
      font-family: 'Georgia', serif;
      margin-top: 0;
    }
    
    .roller-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 20px;
      margin-top: 20px;
    }
    
    .roller-item {
      background: rgba(40, 40, 60, 0.5);
      border: 1px solid rgba(74, 74, 106, 0.5);
      border-radius: 8px;
      padding: 15px;
      text-align: center;
    }
    
    .roller-label {
      font-weight: bold;
      color: #d0d0e0;
      margin-bottom: 10px;
      font-size: 14px;
    }
    
    .controls {
      margin-top: 15px;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    
    .control-group {
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: 12px;
    }
    
    .control-group label {
      flex: 1;
      text-align: left;
    }
    
    .control-group select,
    .control-group input {
      flex: 0 0 auto;
      padding: 5px;
      background: rgba(0, 0, 0, 0.3);
      color: #e0e0e0;
      border: 1px solid #6a6a9a;
      border-radius: 4px;
    }
    
    #log {
      background: rgba(0, 0, 0, 0.3);
      border-radius: 6px;
      padding: 15px;
      max-height: 400px;
      overflow-y: auto;
      font-family: 'Consolas', 'Monaco', monospace;
      font-size: 12px;
    }
    
    .log-entry {
      padding: 8px 0;
      border-bottom: 1px solid rgba(255, 255, 255, 0.1);
    }
    
    .log-entry:last-child {
      border-bottom: none;
    }
    
    .log-timestamp {
      color: #808090;
      margin-right: 10px;
    }
    
    .log-skill {
      color: #ffd700;
      font-weight: bold;
    }
    
    .log-result {
      color: #44ff44;
    }
    
    .log-volatility {
      color: #9a7aca;
      font-style: italic;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>🎲 Volatility System Test</h1>
    
    <div class="test-section">
      <h2>D20 Skill Rollers with Volatility</h2>
      <div class="roller-grid">
        <!-- Proficient Skill -->
        <div class="roller-item">
          <div class="roller-label">Proficient Skill</div>
          <d20-skill-roller 
            id="roller1"
            skill-name="Force" 
            potential="12" 
            resistance="2"
            proficiency="proficient"
            volatility-die-size="6"
            stress="1">
          </d20-skill-roller>
          <div class="controls">
            <div class="control-group">
              <label>Proficiency:</label>
              <select id="prof1">
                <option value="none">None</option>
                <option value="proficient" selected>Proficient</option>
                <option value="expert">Expert</option>
              </select>
            </div>
            <div class="control-group">
              <label>Die Size:</label>
              <select id="die1">
                <option value="4">d4</option>
                <option value="6" selected>d6</option>
                <option value="8">d8</option>
                <option value="10">d10</option>
                <option value="12">d12</option>
              </select>
            </div>
            <div class="control-group">
              <label>Stress:</label>
              <input type="number" id="stress1" value="1" min="0" max="12" style="width: 50px;">
            </div>
          </div>
        </div>
        
        <!-- Expert Skill -->
        <div class="roller-item">
          <div class="roller-label">Expert Skill</div>
          <d20-skill-roller 
            id="roller2"
            skill-name="Sleight" 
            potential="15" 
            resistance="3"
            proficiency="expert"
            volatility-die-size="8"
            stress="2">
          </d20-skill-roller>
          <div class="controls">
            <div class="control-group">
              <label>Proficiency:</label>
              <select id="prof2">
                <option value="none">None</option>
                <option value="proficient">Proficient</option>
                <option value="expert" selected>Expert</option>
              </select>
            </div>
            <div class="control-group">
              <label>Die Size:</label>
              <select id="die2">
                <option value="4">d4</option>
                <option value="6">d6</option>
                <option value="8" selected>d8</option>
                <option value="10">d10</option>
                <option value="12">d12</option>
              </select>
            </div>
            <div class="control-group">
              <label>Stress:</label>
              <input type="number" id="stress2" value="2" min="0" max="12" style="width: 50px;">
            </div>
          </div>
        </div>
        
        <!-- No Proficiency -->
        <div class="roller-item">
          <div class="roller-label">No Proficiency</div>
          <d20-skill-roller 
            id="roller3"
            skill-name="Esoterica" 
            potential="10" 
            resistance="1"
            proficiency="none"
            volatility-die-size="4"
            stress="0">
          </d20-skill-roller>
          <div class="controls">
            <div class="control-group">
              <label>Proficiency:</label>
              <select id="prof3">
                <option value="none" selected>None</option>
                <option value="proficient">Proficient</option>
                <option value="expert">Expert</option>
              </select>
            </div>
            <div class="control-group">
              <label>Die Size:</label>
              <select id="die3">
                <option value="4" selected>d4</option>
                <option value="6">d6</option>
                <option value="8">d8</option>
                <option value="10">d10</option>
                <option value="12">d12</option>
              </select>
            </div>
            <div class="control-group">
              <label>Stress:</label>
              <input type="number" id="stress3" value="0" min="0" max="12" style="width: 50px;">
            </div>
          </div>
        </div>
      </div>
    </div>
    
    <div class="test-section">
      <h2>Standalone Volatility Dice Roller</h2>
      <div class="roller-grid">
        <div class="roller-item">
          <div class="roller-label">3d6 Volatility</div>
          <volatility-dice-roller 
            id="vol1"
            die-size="6" 
            pool-size="3" 
            stress="2"
            label="Roll Volatility">
          </volatility-dice-roller>
        </div>
        
        <div class="roller-item">
          <div class="roller-label">2d8 Volatility</div>
          <volatility-dice-roller 
            id="vol2"
            die-size="8" 
            pool-size="2" 
            stress="4"
            label="Roll Volatility">
          </volatility-dice-roller>
        </div>
        
        <div class="roller-item">
          <div class="roller-label">1d12 Volatility</div>
          <volatility-dice-roller 
            id="vol3"
            die-size="12" 
            pool-size="1" 
            stress="11"
            label="Roll Volatility">
          </volatility-dice-roller>
        </div>
      </div>
    </div>
    
    <div class="test-section">
      <h2>📝 Activity Log</h2>
      <div id="log">
        <div style="text-align: center; color: #808090; font-style: italic;">No rolls yet. Click on a die to start!</div>
      </div>
    </div>
  </div>

  <script type="module" src="src/components/d20-skill-roller.js"></script>
  <script type="module" src="src/components/volatility-dice-roller.js"></script>
  <script type="module">
    const log = document.getElementById('log');
    
    function addLogEntry(message) {
      const timestamp = new Date().toLocaleTimeString();
      const entry = document.createElement('div');
      entry.className = 'log-entry';
      entry.innerHTML = `<span class="log-timestamp">[${timestamp}]</span>${message}`;
      
      if (log.children.length === 1 && log.children[0].textContent.includes('No rolls yet')) {
        log.innerHTML = '';
      }
      
      log.insertBefore(entry, log.firstChild);
      
      // Keep only last 20 entries
      while (log.children.length > 20) {
        log.removeChild(log.lastChild);
      }
    }
    
    // Setup D20 skill roller listeners
    for (let i = 1; i <= 3; i++) {
      const roller = document.getElementById(`roller${i}`);
      const profSelect = document.getElementById(`prof${i}`);
      const dieSelect = document.getElementById(`die${i}`);
      const stressInput = document.getElementById(`stress${i}`);
      
      roller.addEventListener('roll-complete', (e) => {
        const { skillName, roll, result, volatility, proficiency } = e.detail;
        
        let message = `<span class="log-skill">${skillName}</span>: D20=${roll} → <span class="log-result">${result.level}</span>`;
        
        if (volatility) {
          const volStr = volatility.rolls.join(', ');
          message += ` | <span class="log-volatility">Volatility: [${volStr}] → ${volatility.highestValue}`;
          if (volatility.isJinxed) {
            message += ' (Jinxed!)';
          }
          message += '</span>';
        } else {
          message += ' | <span class="log-volatility">No volatility dice</span>';
        }
        
        addLogEntry(message);
      });
      
      profSelect.addEventListener('change', (e) => {
        roller.setAttribute('proficiency', e.target.value);
      });
      
      dieSelect.addEventListener('change', (e) => {
        roller.setAttribute('volatility-die-size', e.target.value);
      });
      
      stressInput.addEventListener('change', (e) => {
        roller.setAttribute('stress', e.target.value);
      });
    }
    
    // Setup volatility dice roller listeners
    for (let i = 1; i <= 3; i++) {
      const volRoller = document.getElementById(`vol${i}`);
      
      volRoller.addEventListener('volatility-roll-complete', (e) => {
        const { rolls, highestValue, isJinxed, dieSize, poolSize } = e.detail;
        
        const volStr = rolls.join(', ');
        let message = `<span class="log-skill">Volatility ${poolSize}d${dieSize}</span>: [${volStr}] → <span class="log-result">${highestValue}</span>`;
        
        if (isJinxed) {
          message += ' <span class="log-volatility">(Jinxed!)</span>';
        }
        
        addLogEntry(message);
      });
    }
  </script>
</body>
</html>
