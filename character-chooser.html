<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Creosmark - Character Chooser</title>
  <style>
    * {
      box-sizing: border-box;
    }
    
    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
      color: #e0e0e0;
      min-height: 100vh;
      margin: 0;
      padding: 0;
    }

    .main-content {
      max-width: 1400px;
      margin: 0 auto;
      padding: 40px 20px;
    }

    .page-title {
      font-family: 'Georgia', serif;
      font-size: 2.5rem;
      color: #ffd700;
      text-align: center;
      margin-bottom: 10px;
      text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.5);
    }

    .page-subtitle {
      text-align: center;
      color: #a0a0b0;
      font-size: 1.1rem;
      margin-bottom: 40px;
    }

    .character-limit-notice {
      background: rgba(106, 74, 154, 0.3);
      border: 2px solid #6a4a9a;
      border-radius: 10px;
      padding: 15px 20px;
      margin-bottom: 30px;
      text-align: center;
      font-size: 0.95rem;
    }

    .character-limit-notice.warning {
      background: rgba(154, 106, 74, 0.3);
      border-color: #9a6a4a;
    }

    .characters-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
      gap: 25px;
      margin-bottom: 30px;
    }

    .character-card {
      background: rgba(30, 30, 50, 0.8);
      border: 2px solid #4a4a6a;
      border-radius: 15px;
      padding: 20px;
      transition: all 0.3s ease;
      cursor: pointer;
      display: flex;
      flex-direction: column;
      gap: 15px;
    }

    .character-card:hover {
      border-color: #6a6a9a;
      transform: translateY(-5px);
      box-shadow: 0 8px 25px rgba(0, 0, 0, 0.4);
    }

    .character-header {
      display: flex;
      align-items: center;
      gap: 15px;
    }

    .character-avatar {
      width: 80px;
      height: 80px;
      border-radius: 50%;
      border: 3px solid #ffd700;
      object-fit: cover;
      background: linear-gradient(135deg, #2a2a4a 0%, #3a3a6a 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 2.5rem;
      flex-shrink: 0;
    }

    .character-info {
      flex: 1;
      min-width: 0;
    }

    .character-name {
      font-family: 'Georgia', serif;
      font-size: 1.4rem;
      color: #ffd700;
      margin: 0 0 5px 0;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .character-meta {
      font-size: 0.85rem;
      color: #a0a0b0;
      margin: 0;
    }

    .character-actions {
      display: flex;
      gap: 10px;
      justify-content: stretch;
    }

    .character-button {
      flex: 1;
      padding: 10px 15px;
      font-size: 14px;
      font-weight: bold;
      color: #fff;
      border: 2px solid;
      border-radius: 8px;
      cursor: pointer;
      transition: all 0.3s ease;
      font-family: 'Georgia', serif;
      text-align: center;
      text-decoration: none;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 5px;
    }

    .view-button {
      background: linear-gradient(135deg, #2a6a4a 0%, #3a7a5a 100%);
      border-color: #3a7a5a;
    }

    .view-button:hover {
      background: linear-gradient(135deg, #3a7a5a 0%, #4a8a6a 100%);
      transform: translateY(-2px);
      box-shadow: 0 4px 12px rgba(42, 106, 74, 0.4);
    }

    .edit-button {
      background: linear-gradient(135deg, #4a4a9a 0%, #5a5aaa 100%);
      border-color: #5a5aaa;
    }

    .edit-button:hover {
      background: linear-gradient(135deg, #5a5aaa 0%, #6a6aba 100%);
      transform: translateY(-2px);
      box-shadow: 0 4px 12px rgba(74, 74, 154, 0.4);
    }

    .delete-button {
      padding: 10px 15px;
      font-size: 14px;
      color: #ff6666;
      background: rgba(139, 0, 0, 0.3);
      border: 2px solid #ff4444;
      border-radius: 8px;
      cursor: pointer;
      transition: all 0.3s ease;
    }

    .delete-button:hover {
      background: rgba(139, 0, 0, 0.5);
      border-color: #ff6666;
      transform: translateY(-2px);
    }

    .new-character-card {
      background: rgba(40, 40, 60, 0.4);
      border: 3px dashed #6a6a9a;
      border-radius: 15px;
      padding: 40px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 15px;
      cursor: pointer;
      transition: all 0.3s ease;
      min-height: 200px;
    }

    .new-character-card:hover {
      background: rgba(50, 50, 70, 0.5);
      border-color: #ffd700;
      transform: translateY(-5px);
      box-shadow: 0 8px 25px rgba(0, 0, 0, 0.4);
    }

    .new-character-icon {
      font-size: 4rem;
      filter: drop-shadow(0 2px 4px rgba(0, 0, 0, 0.5));
    }

    .new-character-text {
      font-family: 'Georgia', serif;
      font-size: 1.3rem;
      color: #e0e0e0;
      text-align: center;
    }

    .empty-state {
      text-align: center;
      padding: 80px 20px;
    }

    .empty-state-icon {
      font-size: 5rem;
      margin-bottom: 20px;
      filter: drop-shadow(0 4px 8px rgba(0, 0, 0, 0.5));
    }

    .empty-state-title {
      font-family: 'Georgia', serif;
      font-size: 2rem;
      color: #ffd700;
      margin-bottom: 10px;
    }

    .empty-state-description {
      font-size: 1.1rem;
      color: #a0a0b0;
      margin-bottom: 30px;
    }

    .create-first-button {
      display: inline-block;
      padding: 15px 40px;
      font-size: 18px;
      font-weight: bold;
      color: #fff;
      background: linear-gradient(135deg, #4a4a9a 0%, #6a6aba 100%);
      border: 2px solid #5a5aaa;
      border-radius: 10px;
      cursor: pointer;
      transition: all 0.3s ease;
      font-family: 'Georgia', serif;
      text-decoration: none;
    }

    .create-first-button:hover {
      background: linear-gradient(135deg, #5a5aaa 0%, #7a7aca 100%);
      transform: translateY(-2px);
      box-shadow: 0 6px 20px rgba(74, 74, 154, 0.5);
    }

    @media (max-width: 768px) {
      .characters-grid {
        grid-template-columns: 1fr;
      }

      .page-title {
        font-size: 2rem;
      }

      .character-actions {
        flex-direction: column;
      }
    }

    /* Modal styles */
    .modal {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.7);
      z-index: 2000;
      align-items: center;
      justify-content: center;
    }

    .modal.active {
      display: flex;
    }

    .modal-content {
      background: rgba(30, 30, 50, 0.95);
      border: 2px solid #6a6a9a;
      border-radius: 15px;
      padding: 30px;
      max-width: 500px;
      width: 90%;
      box-shadow: 0 10px 40px rgba(0, 0, 0, 0.5);
    }

    .modal-title {
      font-family: 'Georgia', serif;
      font-size: 1.8rem;
      color: #ffd700;
      margin: 0 0 20px 0;
    }

    .modal-buttons {
      display: flex;
      gap: 10px;
      margin-top: 20px;
    }

    .modal-button {
      flex: 1;
      padding: 12px 20px;
      font-size: 16px;
      font-weight: bold;
      border: 2px solid;
      border-radius: 8px;
      cursor: pointer;
      transition: all 0.3s ease;
      font-family: 'Georgia', serif;
    }

    .confirm-button {
      color: #fff;
      background: linear-gradient(135deg, #9a4a4a 0%, #ba6a6a 100%);
      border-color: #aa5a5a;
    }

    .confirm-button:hover {
      background: linear-gradient(135deg, #aa5a5a 0%, #ca7a7a 100%);
    }

    .cancel-button {
      color: #fff;
      background: linear-gradient(135deg, #4a4a6a 0%, #5a5a7a 100%);
      border-color: #5a5a7a;
    }

    .cancel-button:hover {
      background: linear-gradient(135deg, #5a5a7a 0%, #6a6a8a 100%);
    }
  </style>
</head>
<body>
  <app-header></app-header>

  <div class="main-content">
    <h1 class="page-title">Choose Your Character</h1>
    <p class="page-subtitle">Select a character to view or edit, or create a new one</p>

    <div id="character-limit-notice" class="character-limit-notice" style="display: none;"></div>

    <div id="characters-container">
      <!-- Characters will be loaded here -->
    </div>
  </div>

  <!-- Delete Confirmation Modal -->
  <div id="delete-modal" class="modal">
    <div class="modal-content">
      <h2 class="modal-title">Delete Character?</h2>
      <p>Are you sure you want to delete <strong id="delete-character-name"></strong>?</p>
      <p style="color: #ff6666;">This action cannot be undone.</p>
      <div class="modal-buttons">
        <button class="modal-button cancel-button" id="cancel-delete">Cancel</button>
        <button class="modal-button confirm-button" id="confirm-delete">Delete</button>
      </div>
    </div>
  </div>

  <script type="module" src="src/components/app-header.js"></script>
  <script type="module">
    import characterStorage from './src/services/character-storage.js';

    let characters = [];
    let deleteTargetId = null;

    // Initialize
    async function init() {
      await characterStorage.initialize();
      
      // Set active tab in header
      const header = document.querySelector('app-header');
      header.setActiveTab('characters');

      // Try to migrate old character data
      const migrated = characterStorage.migrateCurrentCharacter();
      if (migrated) {
        console.log('Migrated old character data to new format');
      }

      await loadCharacters();
      setupEventListeners();
    }

    // Load and display characters
    async function loadCharacters() {
      characters = await characterStorage.getCharacters();
      renderCharacters();
      updateCharacterLimit();
    }

    // Render character cards
    function renderCharacters() {
      const container = document.getElementById('characters-container');
      
      if (characters.length === 0) {
        container.innerHTML = `
          <div class="empty-state">
            <div class="empty-state-icon">⚔️</div>
            <h2 class="empty-state-title">No Characters Yet</h2>
            <p class="empty-state-description">Create your first character to begin your adventure</p>
            <button class="create-first-button" onclick="createNewCharacter()">Create Character</button>
          </div>
        `;
        return;
      }

      const grid = document.createElement('div');
      grid.className = 'characters-grid';

      // Add existing characters
      characters.forEach(character => {
        const card = createCharacterCard(character);
        grid.appendChild(card);
      });

      // Add "new character" card if not at limit
      if (characters.length < 5) {
        const newCard = createNewCharacterCard();
        grid.appendChild(newCard);
      }

      container.innerHTML = '';
      container.appendChild(grid);
    }

    // Create character card
    function createCharacterCard(character) {
      const card = document.createElement('div');
      card.className = 'character-card';

      const avatar = character.avatar || '🧙';
      const updatedDate = character.updatedAt ? new Date(character.updatedAt).toLocaleDateString() : 'Unknown';

      card.innerHTML = `
        <div class="character-header">
          <div class="character-avatar">${avatar}</div>
          <div class="character-info">
            <h3 class="character-name">${escapeHtml(character.name || 'Unnamed Character')}</h3>
            <p class="character-meta">Last updated: ${updatedDate}</p>
          </div>
        </div>
        <div class="character-actions">
          <a href="character-sheet.html?id=${character.id}" class="character-button view-button">
            📋 View
          </a>
          <a href="character-builder.html?id=${character.id}" class="character-button edit-button">
            ✏️ Edit
          </a>
          <button class="delete-button" data-id="${character.id}" data-name="${escapeHtml(character.name || 'Unnamed Character')}">
            🗑️
          </button>
        </div>
      `;

      return card;
    }

    // Create "new character" card
    function createNewCharacterCard() {
      const card = document.createElement('div');
      card.className = 'new-character-card';
      card.innerHTML = `
        <div class="new-character-icon">➕</div>
        <div class="new-character-text">Create New Character</div>
      `;
      card.addEventListener('click', createNewCharacter);
      return card;
    }

    // Update character limit notice
    function updateCharacterLimit() {
      const notice = document.getElementById('character-limit-notice');
      const count = characters.length;
      const limit = 5;

      if (count >= limit) {
        notice.style.display = 'block';
        notice.className = 'character-limit-notice warning';
        notice.innerHTML = `
          <strong>⚠️ Character Limit Reached</strong><br>
          You have ${count} out of ${limit} characters (local storage limit).<br>
          Login with Supabase for unlimited character storage.
        `;
      } else if (count >= limit - 1) {
        notice.style.display = 'block';
        notice.className = 'character-limit-notice';
        notice.innerHTML = `
          You have ${count} out of ${limit} characters.<br>
          Login with Supabase for unlimited character storage.
        `;
      } else {
        notice.style.display = 'none';
      }
    }

    // Create new character
    async function createNewCharacter() {
      try {
        const character = characterStorage.createDefaultCharacter();
        characterStorage.setActiveCharacter(character.id);
        window.location.href = `character-builder.html?id=${character.id}`;
      } catch (error) {
        alert(error.message);
      }
    }

    // Setup event listeners
    function setupEventListeners() {
      // Header navigation
      document.querySelector('app-header').addEventListener('navigate-home', () => {
        window.location.reload();
      });

      // Login/logout (placeholder)
      document.querySelector('app-header').addEventListener('login-request', () => {
        alert('Supabase login coming soon! For now, you can use local storage for up to 5 characters.');
      });

      document.querySelector('app-header').addEventListener('logout-request', () => {
        alert('Logout functionality coming soon!');
      });

      // Delete button clicks
      document.addEventListener('click', (e) => {
        if (e.target.classList.contains('delete-button') || e.target.closest('.delete-button')) {
          const button = e.target.classList.contains('delete-button') ? e.target : e.target.closest('.delete-button');
          deleteTargetId = button.dataset.id;
          const characterName = button.dataset.name;
          showDeleteModal(characterName);
        }
      });

      // Modal buttons
      document.getElementById('cancel-delete').addEventListener('click', hideDeleteModal);
      document.getElementById('confirm-delete').addEventListener('click', confirmDelete);

      // Close modal on backdrop click
      document.getElementById('delete-modal').addEventListener('click', (e) => {
        if (e.target.id === 'delete-modal') {
          hideDeleteModal();
        }
      });
    }

    // Show delete modal
    function showDeleteModal(characterName) {
      document.getElementById('delete-character-name').textContent = characterName;
      document.getElementById('delete-modal').classList.add('active');
    }

    // Hide delete modal
    function hideDeleteModal() {
      document.getElementById('delete-modal').classList.remove('active');
      deleteTargetId = null;
    }

    // Confirm delete
    async function confirmDelete() {
      if (deleteTargetId) {
        await characterStorage.deleteCharacter(deleteTargetId);
        hideDeleteModal();
        await loadCharacters();
      }
    }

    // Utility function
    function escapeHtml(text) {
      const div = document.createElement('div');
      div.textContent = text;
      return div.innerHTML;
    }

    // Make createNewCharacter available globally
    window.createNewCharacter = createNewCharacter;

    // Initialize on load
    init();
  </script>
</body>
</html>
