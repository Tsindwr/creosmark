<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Skills Section Preview</title>
  <style>
    body {
      font-family: 'Segoe UI', sans-serif;
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
      color: #e0e0e0;
      padding: 40px;
      margin: 0;
    }
    
    .preview-container {
      max-width: 400px;
      margin: 0 auto;
      background: rgba(30, 30, 50, 0.9);
      padding: 30px;
      border-radius: 15px;
      box-shadow: 0 10px 40px rgba(0, 0, 0, 0.5);
    }
    
    h1 {
      text-align: center;
      color: #ffd700;
      font-family: 'Georgia', serif;
      margin-top: 0;
    }
    
    .skills-section {
      background: rgba(30, 30, 50, 0.8);
      border: 2px solid #4a4a6a;
      border-radius: 12px;
      padding: 15px;
      margin-bottom: 20px;
    }
    
    .skills-section-title {
      font-family: 'Georgia', serif;
      font-size: 1rem;
      color: #ffd700;
      text-transform: uppercase;
      letter-spacing: 1px;
      margin: 0 0 12px 0;
      font-weight: bold;
      border-bottom: 1px solid rgba(255, 215, 0, 0.3);
      padding-bottom: 8px;
    }
    
    .skill-item {
      display: flex;
      flex-direction: column;
      gap: 10px;
      padding: 12px;
      background: rgba(40, 40, 60, 0.5);
      border-radius: 8px;
      border: 2px solid rgba(74, 74, 106, 0.3);
      margin-bottom: 8px;
      transition: all 0.3s ease;
    }
    
    .skill-item:hover {
      background: rgba(50, 50, 70, 0.6);
      border-color: #6a6a9a;
    }
    
    .skill-header {
      display: flex;
      align-items: center;
      gap: 10px;
    }
    
    .skill-proficiency {
      width: 24px;
      height: 24px;
      border-radius: 50%;
      border: 2px solid #6a6a9a;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      font-size: 0.75rem;
      flex-shrink: 0;
    }
    
    .skill-proficiency.proficient {
      background: #4a9a4a;
      border-color: #5aaa5a;
      color: white;
    }
    
    .skill-name {
      font-size: 0.95rem;
      color: #e0e0e0;
      font-weight: 600;
      flex: 1;
    }
    
    .comparison {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 20px;
      margin-top: 30px;
    }
    
    .comparison-item {
      background: rgba(40, 40, 60, 0.6);
      padding: 20px;
      border-radius: 10px;
      border: 2px solid #4a4a6a;
    }
    
    .comparison-item h3 {
      color: #ffd700;
      margin-top: 0;
      font-size: 1.1rem;
      border-bottom: 1px solid rgba(255, 215, 0, 0.3);
      padding-bottom: 8px;
    }
    
    .old-button {
      padding: 6px 12px;
      font-size: 0.85rem;
      font-weight: bold;
      color: #fff;
      background: linear-gradient(135deg, #4a4a9a 0%, #5a5aaa 100%);
      border: 1px solid #5a5aaa;
      border-radius: 6px;
      cursor: pointer;
      width: 100%;
    }
    
    .old-style {
      display: grid;
      grid-template-columns: 30px 1fr 60px;
      gap: 10px;
      align-items: center;
      padding: 8px;
      background: rgba(40, 40, 60, 0.4);
      border-radius: 6px;
      border: 1px solid rgba(74, 74, 106, 0.3);
      margin-bottom: 8px;
    }
    
    .badge {
      display: inline-block;
      padding: 4px 12px;
      background: rgba(255, 68, 68, 0.2);
      color: #ff4444;
      border: 1px solid #ff4444;
      border-radius: 6px;
      font-size: 0.75rem;
      font-weight: bold;
      margin-top: 10px;
    }
    
    .badge.new {
      background: rgba(68, 255, 68, 0.2);
      color: #44ff44;
      border-color: #44ff44;
    }
    
    @media (max-width: 900px) {
      .comparison {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <div class="preview-container">
    <h1>🎲 Skills Section - Before & After</h1>
    
    <div class="comparison">
      <div class="comparison-item">
        <h3>❌ BEFORE (Old)</h3>
        <div class="old-style">
          <div class="skill-proficiency proficient">●</div>
          <div class="skill-name">Force</div>
          <button class="old-button">Roll</button>
        </div>
        <div class="old-style">
          <div class="skill-proficiency"></div>
          <div class="skill-name">Brace</div>
          <button class="old-button">Roll</button>
        </div>
        <span class="badge">Ugly button, no visual feedback</span>
      </div>
      
      <div class="comparison-item">
        <h3>✅ AFTER (New)</h3>
        <p style="font-size: 0.9rem; color: #a0a0b0; margin-top: 0;">Each skill now has an interactive D20 dice roller with color-coded results!</p>
        <span class="badge new">Visual dice roller, animated results</span>
      </div>
    </div>
  </div>
  
  <script type="module" src="src/components/d20-skill-roller.js"></script>
  <script type="module">
    // Add D20 roller example to the "After" section
    const afterSection = document.querySelectorAll('.comparison-item')[1];
    
    // Create skill items with D20 rollers
    const skills = [
      { name: 'Force', proficient: true, potential: 12, resistance: 2 },
      { name: 'Brace', proficient: false, potential: 12, resistance: 2 }
    ];
    
    skills.forEach(skill => {
      const skillItem = document.createElement('div');
      skillItem.className = 'skill-item';
      
      const skillHeader = document.createElement('div');
      skillHeader.className = 'skill-header';
      
      const profIcon = document.createElement('div');
      profIcon.className = `skill-proficiency ${skill.proficient ? 'proficient' : ''}`;
      if (skill.proficient) profIcon.textContent = '●';
      
      const skillLabel = document.createElement('div');
      skillLabel.className = 'skill-name';
      skillLabel.textContent = skill.name;
      
      skillHeader.appendChild(profIcon);
      skillHeader.appendChild(skillLabel);
      skillItem.appendChild(skillHeader);
      
      const roller = document.createElement('d20-skill-roller');
      roller.setAttribute('skill-name', skill.name);
      roller.setAttribute('potential', skill.potential);
      roller.setAttribute('resistance', skill.resistance);
      
      skillItem.appendChild(roller);
      
      // Insert before the badge
      const badge = afterSection.querySelector('.badge');
      afterSection.insertBefore(skillItem, badge);
    });
  </script>
</body>
</html>
